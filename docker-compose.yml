version: "3.9"

services:
  mcpruntime:
    build:
      context: .
      target: python-only
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./skills:/app/skills
      - ./workspace:/app/workspace
      # Mount the docker socket so OpenSandbox can spawn sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SANDBOX_TYPE=opensandbox
      - OPENSANDBOX_DOMAIN=host.docker.internal:8080

volumes:
  sandbox_data:
